<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | USUGE NAVI</title>
  <meta name="description" content="USUGE NAVIへのお問い合わせページです。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0A0A0A; --dark: #111111; --dark2: #1A1A1A; --dark3: #222222;
      --gold: #C9A84C; --gold-light: #E8C97A; --gold-dark: #8B6914;
      --white: #FFFFFF; --gray: #888888; --gray-light: #CCCCCC;
      --border: rgba(201,168,76,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--black); color: var(--white); font-size: 15px; line-height: 1.8; }
    a { color: inherit; text-decoration: none; }

    header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 40px; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; }
    .logo-sub { font-size: 9px; letter-spacing: 3px; color: var(--gray); display: block; text-transform: uppercase; margin-top: -2px; }
    nav { display: flex; gap: 32px; }
    nav a { font-size: 11px; letter-spacing: 2px; color: var(--gray-light); text-transform: uppercase; transition: color .3s; }
    nav a:hover { color: var(--gold); }

    .page-hero { padding: 140px 40px 80px; text-align: center; border-bottom: 1px solid var(--border); position: relative; }
    .page-hero::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 1px; height: 40px; background: linear-gradient(180deg, var(--gold), transparent); }
    .page-label { font-size: 10px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 600; letter-spacing: 2px; }

    .container { max-width: 640px; margin: 0 auto; padding: 80px 40px 120px; }

    .notice {
      border-left: 2px solid var(--gold);
      padding: 12px 20px;
      margin-bottom: 48px;
      font-size: 12px; color: var(--gray); letter-spacing: .5px; line-height: 2;
    }
    .notice ul { list-style: none; }
    .notice ul li { padding-left: 16px; position: relative; }
    .notice ul li::before { content: "—"; position: absolute; left: 0; color: var(--gold); font-size: 11px; }

    .form-group { margin-bottom: 28px; }
    label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--gray); text-transform: uppercase; margin-bottom: 10px; }
    .req { color: var(--gold); margin-left: 4px; }
    input[type="text"], input[type="email"], select, textarea {
      width: 100%;
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--white);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      padding: 14px 18px;
      outline: none;
      transition: border-color .3s;
      -webkit-appearance: none;
    }
    input[type="text"]:focus, input[type="email"]:focus, select:focus, textarea:focus { border-color: var(--gold); }
    input::placeholder, textarea::placeholder { color: var(--gray); }
    select { cursor: pointer; }
    select option { background: var(--dark2); }
    textarea { height: 160px; resize: vertical; line-height: 1.8; }

    .privacy-check { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 32px; }
    .privacy-check input[type="checkbox"] { width: 16px; height: 16px; margin-top: 4px; flex-shrink: 0; accent-color: var(--gold); cursor: pointer; }
    .privacy-check label { font-size: 12px; color: var(--gray); letter-spacing: .5px; text-transform: none; }
    .privacy-check a { color: var(--gold); border-bottom: 1px solid var(--border); }

    .submit-btn {
      width: 100%; padding: 18px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer;
      transition: background .3s, color .3s;
    }
    .submit-btn:hover { background: var(--gold); color: var(--black); }

    .success-message { display: none; text-align: center; padding: 60px 0; }
    .success-message .s-label { font-size: 10px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
    .success-message h3 { font-family: 'Cormorant Garamond', serif; font-size: 28px; margin-bottom: 16px; }
    .success-message p { color: var(--gray-light); font-size: 13px; }

    footer { background: var(--dark); border-top: 1px solid var(--border); padding: 48px 40px; text-align: center; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--gold); letter-spacing: 4px; margin-bottom: 24px; }
    .footer-links { display: flex; gap: 32px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .footer-links a { font-size: 10px; letter-spacing: 2px; color: var(--gray); text-transform: uppercase; transition: color .3s; }
    .footer-links a:hover { color: var(--gold); }
    .footer-copy { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,.2); text-transform: uppercase; }

    @media (max-width: 768px) {
      header { padding: 0 20px; } nav { display: none; }
      .page-hero { padding: 120px 20px 60px; } .page-title { font-size: 32px; }
      .container { padding: 60px 20px 80px; } footer { padding: 40px 20px; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="/">
      <div class="logo">USUGE NAVI</div>
      <span class="logo-sub">薄毛・育毛 比較メディア</span>
    </a>
    <nav>
      <a href="/#ranking">Ranking</a>
      <a href="/#articles">Column</a>
      <a href="/#faq">FAQ</a>
    </nav>
  </div>
</header>

<div class="page-hero">
  <div class="page-label">Support</div>
  <h1 class="page-title">Contact</h1>
</div>

<div class="container">
  <div class="notice">
    <ul>
      <li>商品の効果・副作用については各メーカーまたは医療機関にお問い合わせください</li>
      <li>ご返信まで3〜5営業日ほどいただく場合があります</li>
      <li>内容によってはご返信できない場合がございます</li>
    </ul>
  </div>

  <iframe
    src="https://docs.google.com/forms/d/e/1FAIpQLSdIHdCKl8qJNbT3YWCF9IRTMvfsCfoBzncix1eHsGQXl7yhIw/viewform?embedded=true"
    width="100%"
    height="960"
    frameborder="0"
    marginheight="0"
    marginwidth="0"
    style="display:block; background:transparent;">
    読み込んでいます…
  </iframe>
</div>

<footer>
  <div class="footer-logo">USUGE NAVI</div>
  <div class="footer-links">
    <a href="privacy.html">Privacy</a>
    <a href="ad-policy.html">Ad Policy</a>
    <a href="contact.html">Contact</a>
    <a href="about.html">About</a>
  </div>
  <p class="footer-copy">当サイトはアフィリエイトプログラムに参加しています。&nbsp;&nbsp;©&nbsp;2026&nbsp;USUGE NAVI</p>
</footer>


</body>
</html>
